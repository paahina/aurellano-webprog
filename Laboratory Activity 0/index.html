<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/index.css" />
    <title>Laboratory Activity 0 - JavaScript Refresher</title>
  </head>
  <body>
    <div class="main-container">
      <div>
        <h1>Student Attendance Tracker</h1>
        <p style="color: grey; margin-top: 5px">
          Add students, mark attendance, and remove entries.
        </p>
      </div>

      <div class="input-section">
        <input
          type="text"
          id="studentName"
          class="student-input"
          placeholder="Enter student name..."
        />
        <button id="add-student" class="add button">Add Student</button>
      </div>
      <ul class="student-lists"></ul>
    </div>
    <script type="module" src="./scripts/index.js"></script>
  </body>
</html>
